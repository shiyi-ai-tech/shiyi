# 史佚 CI — 构建 + 测试 + 产物
name: Build & Test

on:
  push:
    branches: [master, main, "v*"]
  pull_request:
    branches: [master, main]

jobs:
  test-and-build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install deps
      run: |
        python -m pip install --upgrade pip build
        pip install -e ./shiyi-common -e ./shiyi-core -e ./shiyi-shell
        pip install hnswlib numpy jieba pytest

    - name: Run tests
      run: |
        python -m pytest tests/test_v0143_regression.py -v --tb=short

    - name: Build wheels
      run: |
        bash scripts/build.sh

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: shiyi-wheels-py${{ matrix.python-version }}
        path: dist/*.whl
